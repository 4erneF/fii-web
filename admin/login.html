<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход · CMS Факультет ИИ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .login-screen {
      min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(135deg, #0b1226 0%, #1a2046 100%);
      padding: 24px; font-family: 'Inter', system-ui, sans-serif;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: #fff; padding: 32px; border-radius: 16px;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,.4);
    }
    .login-card h1 { margin: 0 0 4px; font-size: 22px; }
    .login-card p.sub { margin: 0 0 22px; color: #687087; font-size: 14px; }
    .login-card label { display: block; margin-bottom: 12px; font-size: 13px; color: #2a3357; font-weight: 500; }
    .login-card input {
      width: 100%; box-sizing: border-box;
      margin-top: 6px; padding: 10px 12px;
      border: 1px solid #d6dbea; border-radius: 8px; font-size: 14px;
      font-family: inherit;
    }
    .login-card input:focus { outline: 2px solid #4f7cf6; border-color: transparent; }
    .login-btn {
      width: 100%; margin-top: 6px; padding: 12px;
      background: #2b4eea; color: #fff; border: 0; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .login-btn:hover  { background: #1f3dc7; }
    .login-btn:disabled { background: #8ea0e6; cursor: not-allowed; }
    .login-error {
      display: none; margin-top: 12px; padding: 8px 12px;
      background: #fde8e8; color: #9b1c1c; border-radius: 6px; font-size: 13px;
    }
    .login-error.is-visible { display: block; }
  </style>
</head>
<body class="login-screen">
  <form class="login-card" id="loginForm" autocomplete="on">
    <h1>CMS · Факультет ИИ</h1>
    <p class="sub">Войдите, чтобы управлять контентом сайта</p>

    <label>
      Логин
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      Пароль
      <input type="password" name="password" autocomplete="current-password" required>
    </label>

    <button type="submit" class="login-btn" id="loginBtn">Войти</button>
    <div class="login-error" id="loginError"></div>
  </form>

  <script src="admin-api.js"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');

      // Already logged in? Verify token and bounce to dashboard.
      if (window.FiiAdminApi.getToken()) {
        window.FiiAdminApi.me()
          .then(() => location.replace('admin.html'))
          .catch(() => window.FiiAdminApi.clearToken());
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.classList.remove('is-visible');
        btn.disabled = true;
        btn.textContent = 'Входим…';
        const data = new FormData(form);
        try {
          await window.FiiAdminApi.login(data.get('username'), data.get('password'));
          location.replace('admin.html');
        } catch (e2) {
          err.textContent = e2.message || 'Не удалось войти';
          err.classList.add('is-visible');
          btn.disabled = false;
          btn.textContent = 'Войти';
        }
      });
    })();
  </script>
</body>
</html>
